<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Budget Tracker</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>💰 Budget Tracker</h1>

    <div class="balance">
      <h2>Balance</h2>
      <h3 id="balance">₹0</h3>
    </div>

    <div class="summary">
      <div>
        <h4>Income</h4>
        <p id="income">₹0</p>
      </div>
      <div>
        <h4>Expense</h4>
        <p id="expense">₹0</p>
      </div>
    </div>

    <h3>Add Transaction</h3>
    <form id="form">
      <input type="text" id="text" placeholder="Description" required>
      <input type="number" id="amount" placeholder="Amount (+income, -expense)" required>
      <button>Add</button>
    </form>

    <h3>History</h3>
    <ul id="list"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
